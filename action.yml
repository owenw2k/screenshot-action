name: PR Screenshots
description: >
  Capture element-level screenshots of data-screenshot sections, diff them
  against base-ref baselines, and inject before/after tables into the PR
  description. Stateless — no branch storage needed.

inputs:
  github-token:
    description: >
      GitHub token with pull-requests:write and contents:write permissions.
      contents:write is required to create the screenshots-cdn release and upload assets.
    required: true
  pr-number:
    description: Pull request number. Required on pull_request events.
    required: false
    default: ""
  base-url:
    description: URL of the already-running server to screenshot.
    required: false
    default: "http://localhost:3000"
  base-ref:
    description: >
      Branch or ref to check out for before screenshots.
      Skipped gracefully if the ref does not exist.
    required: false
    default: "main"
  install-command:
    description: Command to install dependencies in the base-ref worktree.
    required: false
    default: "npm ci"
  build-command:
    description: Command to build the app in the base-ref worktree.
    required: false
    default: "npm run build"
  serve-command:
    description: Command to start the server in the base-ref worktree.
    required: false
    default: "npm start"
  dark-mode-toggle-label:
    description: >
      Accessible label (or substring) of the dark-mode toggle button.
      When provided, screenshots are captured in both light and dark mode.
      Omit to capture light mode only.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install action dependencies
      shell: bash
      run: cd "${{ github.action_path }}" && npm install

    - name: Install Playwright browser
      shell: bash
      run: cd "${{ github.action_path }}" && node_modules/.bin/playwright install chromium --with-deps

    - name: Run screenshot pipeline
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BASE_URL: ${{ inputs.base-url }}
        BASE_REF: ${{ inputs.base-ref }}
        BASE_PORT: "3001"
        INSTALL_COMMAND: ${{ inputs.install-command }}
        BUILD_COMMAND: ${{ inputs.build-command }}
        SERVE_COMMAND: ${{ inputs.serve-command }}
        DARK_MODE_LABEL: ${{ inputs.dark-mode-toggle-label }}
        REPO: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
      run: cd "${{ github.action_path }}" && node_modules/.bin/tsx scripts/main.ts
